<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zombie Apocalypse Survival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #game-container {
            position: relative;
            width: 100vmin;
            max-width: 600px;
            aspect-ratio: 3/4;
            max-height: 100vh;
            max-height: 100dvh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border: 2px solid #333;
            touch-action: none;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            gap: 4px;
            z-index: 10;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
        }

        .hud-item.danger {
            color: #ff4444;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.4; }
        }

        #weapon-indicator {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            pointer-events: none;
            z-index: 10;
        }

        .weapon-slot {
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .weapon-slot.active {
            border-color: #ffcc00;
            box-shadow: 0 0 12px rgba(255, 204, 0, 0.5);
            background: rgba(255, 204, 0, 0.2);
            transform: scale(1.1);
        }

        /* Mobile control buttons - positioned OUTSIDE canvas area */
        #mobile-buttons {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 20;
            pointer-events: none;
        }

        .mobile-action-btn {
            pointer-events: auto;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-action-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
        }

        #reload-btn {
            border-color: rgba(255, 200, 0, 0.7);
        }

        #swap-btn {
            border-color: rgba(100, 200, 255, 0.7);
        }

        /* Desktop instructions */
        #desktop-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 12px;
            border-radius: 10px;
        }

        @media (min-width: 768px) {
            #mobile-buttons {
                display: none;
            }
        }

        @media (max-width: 767px) {
            #desktop-hint {
                display: none;
            }
            .hud-item {
                font-size: 10px;
                padding: 4px 7px;
            }
            .weapon-slot {
                width: 30px;
                height: 30px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- HUD -->
        <div id="hud">
            <span class="hud-item" id="health-hud">❤️ 200</span>
            <span class="hud-item">🌊 <span id="wave-hud">1</span></span>
            <span class="hud-item">💀 <span id="kills-hud">0</span></span>
            <span class="hud-item">⭐ <span id="score-hud">0</span></span>
        </div>

        <!-- Weapon indicator -->
        <div id="weapon-indicator">
            <div class="weapon-slot active" data-slot="0">🔫</div>
            <div class="weapon-slot" data-slot="1">💥</div>
            <div class="weapon-slot" data-slot="2">🎯</div>
            <div class="weapon-slot" data-slot="3">🔥</div>
        </div>

        <!-- Mobile buttons - OUTSIDE canvas -->
        <div id="mobile-buttons">
            <button class="mobile-action-btn" id="reload-btn" title="Reload">🔄</button>
            <button class="mobile-action-btn" id="swap-btn" title="Swap Weapon">⇄</button>
        </div>

        <!-- Desktop hint -->
        <div id="desktop-hint">
            🖱️ WASD Move | Mouse Aim | Click Shoot | R Reload | 1-4 Swap
        </div>
    </div>

    <script src="zombie-game.js"></script>
</body>
</html>
